<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Deal Finder</title>
</head>
<body>
    <h1>Data Deal Finder.</h1> 
    <p>Compare Ethio Telecom and Safaricom internet packages to find the best value for your money.</p> 
    <main>
    <section>
        <h2>Add package</h2>
    <label>provider</label>
    <select>
        <option>Ethio Telecom</option>
        <option>Safaricom</option>
    </select>
    <label>package name</label>
    <input type="text">
    <label>price input</label>
    <input type="number">
    <label>Data input</label>
    <input type="number">
    <button>Add package </button>
    </section> 
    <section>
        <h2>Added packages</h2>
       <table>
    <tr>
        <th>Provider</th>
        <th>Package Name</th>
        <th>Price (ETB)</th>
        <th>Data (GB)</th>
    </tr>

    <tr>
        <td>Ethio Telecom</td>
        <td>Weekly Super</td>
        <td>100</td>
        <td>3</td>
    </tr>

    <tr>
        <td>Safaricom</td>
        <td>Data Max</td>
        <td>120</td>
        <td>4</td>
    </tr>
</table>
</section>
      
    
    <section>
        <h2>Comparison Results</h2>
        </section>
     
    </main>
    <footer>Data Deal Finder © 2026</footer>
   
</body>
</html>
